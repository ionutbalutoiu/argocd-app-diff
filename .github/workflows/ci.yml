name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          install-only: true

      - name: Check formatting
        run: make fmt-check

      - name: Build
        run: make build

      - name: Run tests
        run: make test

      - name: Run linter
        run: make lint
